<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>While Loops</title>
  </head>
  <body>
    
    <script>
      let hour = 6;
      while (hour < 8) {
        document.write("Time is " + hour + ":00. John is not at work");
        document.write("<br>");
        hour++;
      }

      while (hour < 16) {
        document.write("Time is " + hour + ":00. John is at work");
        document.write("<br>");
        hour++;
      }
      document.write("Time is " + hour + ":00. John is done working");
    </script>
