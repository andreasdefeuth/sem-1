<!DOCTYPE html>
<html>
    <head>
        <title>Music</title>
        <script src="jsonview.js"></script>
        <script src="endpoint-user.js"></script>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Music</h1>
        <ul>
            <li><a href="/api/greeting">Greeting</a></li>
            <li><a href="/api/timestamp">Timestamp</a></li>
            <li><a href="/api/now">Now</a></li>
            <li><a href="/api/staff/0">Alice</a></li>
            <li><a href="/api/staff/1">Bob</a></li>
            <li><a href="/api/staff/0?format=string">Alice as string</a></li>
            <li><a href="/api/staff/0?field=role&field=dept">Alice with role and department</a></li>
        </ul>
    </body>
    <script>
        useEndpoint('GET', '/api/greeting');
        useEndpoint('GET', '/api/timestamp');
        useEndpoint('GET', '/api/now');
        useEndpoint('GET', '/api/staff/0');
        useEndpoint('GET', '/api/staff/1');
        useEndpoint('GET', '/api/staff/0?format=string');
        useEndpoint('GET', '/api/staff/1?field=age');
    </script>
</html>
